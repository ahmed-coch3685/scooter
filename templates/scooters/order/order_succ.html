<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تم تأكيد الطلب</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    background: rgba(255,255,255,0.1);
    padding:40px;
    border-radius:15px;
    text-align:center;
    backdrop-filter: blur(10px);
    width:400px;
}

.check{
    font-size:70px;
    color:#00ff88;
}

h1{
    margin:10px 0;
}

.order-id{
    font-size:20px;
    margin:15px 0;
    color:#00ffcc;
}

.btn{
    margin-top:20px;
    display:inline-block;
    padding:12px 25px;
    background:#00ff88;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}
</style>

</head>
<body>

<div class="box">

    <div class="check">✔</div>

    <h1>تم تأكيد الطلب بنجاح</h1>

    <div class="order-id">
        رقم الطلب: #{{ order.id }}
    </div>

    <p>
        شكراً لطلبك ❤️<br>
        سيتم التواصل معك قريباً
    </p>

    <a href="/" class="btn">
        العودة للرئيسية
    </a>

</div>

</body>
</html>
